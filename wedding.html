<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Gallery | Gayatri Jewellers</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body class="collection-page" data-category="wedding">
    <nav class="navbar scrolled" id="navbar">
        <div class="nav-left">
            <a href="index.html" class="logo" style="display: flex; align-items: center; gap: 15px; text-decoration: none;">
                <img src="logo.no.bg.png" alt="Gayatri Jewellers" class="brand-logo" style="height: 50px;">
                <span class="brand-name" style="font-family: 'Cinzel', serif; font-size: 1.4rem; color: #000; letter-spacing: 2px;">Gayatri <span style="color: var(--warm-gold);">Jewellers</span></span>
            </a>
        </div>
        <div class="nav-center">
            <a href="index.html" class="nav-link">Home</a>
            <a href="men.html" class="nav-link">Men</a>
            <a href="wedding.html" class="nav-link active">Wedding</a>
            <a href="couple.html" class="nav-link">Couple</a>
            <a href="women.html" class="nav-link">Women</a>
            <a href="all-collections.html" class="nav-link">All</a>
        </div>
        <div class="nav-right">
            <button class="icon-btn" id="search-trigger"><i class="ph ph-magnifying-glass"></i></button>
            <button class="icon-btn wishlist-btn" id="wishlist-trigger" style="position: relative;">
                <i class="ph ph-heart"></i>
                <span class="badge" id="wishlist-badge">0</span>
            </button>
            <button class="icon-btn" id="profile-trigger"><i class="ph ph-user"></i></button>
        </div>
    </nav>
    <header class="collection-search-header">
        <div class="sub-search-box">
            <i class="ph ph-magnifying-glass"></i>
            <input type="text" placeholder="Search within Wedding Gallery..." class="sub-search-input" id="collection-search">
        </div>
    </header>
    <section class="collection-hero-v2">
        <div class="collection-hero-bg" style="background-image: url('wedding_collection.png');"></div>
        <div class="collection-hero-overlay"></div>
        <div class="hero-v2-content">
            <h1>The Bridal Gallery</h1>
            <p>Ethereal grace for your forever. Discover bespoke wedding masterpieces crafted for royalty.</p>
        </div>
    </section>
    <section class="collection-filter-section">
        <div class="filter-circles-container">
            <div class="filter-circle-item active" data-filter="all">
                <div class="circle-icon"><img src="filter_all_gold_1774681345177.png" alt="All"></div>
                <span class="circle-label">All</span>
            </div>
            <div class="filter-circle-item" data-filter="Necklace Set">
                <div class="circle-icon"><img src="filter_bridal_gold_1774681269431.png" alt="Sets"></div>
                <span class="circle-label">Bridal Sets</span>
            </div>
            <div class="filter-circle-item" data-filter="Mangalsutra">
                <div class="circle-icon"><img src="filter_mangalsutra_gold_1774681305415.png" alt="Mangalsutra"></div>
                <span class="circle-label">Mangalsutra</span>
            </div>
        </div>
    </section>
    <div class="collection-results-info">
        <div class="grid-info-count">Showing <span id="count-display">0</span> premium pieces</div>
    </div>
    <section class="collection-grid-v2" id="collection-grid" style="min-height: 400px;"></section>
    <footer class="footer"><div class="footer-bottom"><p>&copy; 2026 Gayatri Jewellers. All rights reserved.</p></div></footer>
    <div class="search-overlay" id="search-overlay"><div class="search-overlay-backdrop"></div><div class="search-overlay-content"><button class="search-close" id="search-close"><i class="ph ph-x"></i></button><div class="search-header"><div class="search-input-wrapper"><i class="ph ph-magnifying-glass search-icon"></i><input type="text" id="search-input" class="search-input" placeholder="Search treasures..." autocomplete="off"></div></div><div class="search-body" id="search-body"><div class="search-results-panel" id="search-results" style="display:none;"><div class="results-grid" id="results-grid"></div></div></div></div></div>
    <div class="wishlist-overlay" id="wishlist-overlay"><div class="wishlist-overlay-backdrop"></div><div class="wishlist-overlay-content"><button class="wishlist-close" id="wishlist-close"><i class="ph ph-x"></i></button><div class="wishlist-header"><h2>Your Treasury</h2></div><div class="wishlist-body" id="wishlist-grid"></div></div></div>
    <div class="profile-drawer-overlay" id="profile-drawer-overlay"><div class="profile-drawer-backdrop"></div><aside class="profile-drawer"><button class="profile-close" id="profile-close"><i class="ph ph-x"></i></button><div class="profile-guest" id="profile-guest"><h2>Welcome</h2><form id="profile-login-form"><input id="login-name" class="profile-input" placeholder="Full Name" required><input id="login-phone" class="profile-input" type="tel" placeholder="Phone Number" required><button type="submit" id="login-submit-btn">Continue</button></form></div></aside></div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script><script src="script.js"></script>
</body>
</html>
