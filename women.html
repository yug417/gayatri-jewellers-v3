    <script src="https://unpkg.com/@phosphor-icons/web"></script>

<body class="collection-page" data-category="women">
    <!-- Navbar (Universal) -->
    <nav class="navbar scrolled" id="navbar">
        <div class="nav-left"><a href="index.html" class="logo"><img src="logo.no.bg.png" alt="Gayatri Jewellers" class="brand-logo"><span class="brand-name">Gayatri <span style="color:var(--warm-gold);">Jewellers</span></span></a></div>
        <div class="nav-center">
            <a href="index.html" class="nav-link">Home</a>
            <a href="men.html" class="nav-link">Men</a>
            <a href="wedding.html" class="nav-link">Wedding</a>
            <a href="couple.html" class="nav-link">Couple</a>
            <a href="women.html" class="nav-link active">Women</a>
            <a href="all-collections.html" class="nav-link">All</a>
        </div>
        <div class="nav-right">
            <button class="icon-btn" id="search-trigger"><i class="ph ph-magnifying-glass"></i></button>
            <button class="icon-btn wishlist-btn" id="wishlist-trigger" style="position:relative;"><i class="ph ph-heart"></i><span class="badge" id="wishlist-badge" style="position:absolute; top:-5px; right:-5px; background:var(--warm-gold); color:#000; font-size:0.75rem; width:18px; height:18px; border-radius:50%; display:flex; align-items:center; justify-content:center; border:2px solid #fff; font-weight:700;">0</span></button>

        </div>

    <header class="collection-search-header"><div class="sub-search-box"><i class="ph ph-magnifying-glass"></i><input type="text" placeholder="Search within Women's Treasures..." class="sub-search-input" id="collection-search"></div></header>
    <section class="collection-hero-v2"><div class="collection-hero-bg" style="background-image: url('women_hero.png');"></div><div class="collection-hero-overlay"></div><div class="hero-v2-content"><h1>The Women's Collection</h1><p>Enchanting designs for the modern queen. Divine grace in every detail.</p></div></section>
    <section class="collection-filter-section"><div class="filter-circles-container"><div class="filter-circle-item active" data-filter="all"><div class="circle-icon"><img src="filter_all_gold_1774681345177.png" alt="All"></div><span class="circle-label">All</span></div><div class="filter-circle-item" data-filter="Necklace"><div class="circle-icon"><img src="filter_earrings_gold_1774681286021.png" alt="Necklaces"></div><span class="circle-label">Necklaces</span></div><div class="filter-circle-item" data-filter="Ring"><div class="circle-icon"><img src="filter_ring_gold_1774681230674.png" alt="Rings"></div><span class="circle-label">Rings</span></div><div class="filter-circle-item" data-filter="Bangles"><div class="circle-icon"><img src="filter_kada_gold_1774681324265.png" alt="Bangles"></div><span class="circle-label">Bangles</span></div></div></section>

    <div class="fly-heart" id="fly-heart" style="position:fixed; display:none; z-index:10002; color:var(--warm-gold); font-size:2rem;"><i class="ph-fill ph-heart"></i></div>

    <script src="supabase-config.js"></script>
    <script src="script.js"></script>
